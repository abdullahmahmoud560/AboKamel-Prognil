events {
    worker_connections 1024;
}

http {
    include         /etc/nginx/mime.types;
    default_type    application/octet-stream;
    charset         utf-8;

    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name abokamel.prognil.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name abokamel.prognil.com;

        ssl_certificate /etc/letsencrypt/live/abokamel.prognil.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/abokamel.prognil.com/privkey.pem;

        location /images/ {
            alias /usr/share/nginx/html/images/;
            autoindex off;
            try_files $uri $uri/ =404;
        }

        location / {
            proxy_pass http://abokamel-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
